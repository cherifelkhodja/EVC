name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify output
        run: |
          test -d dist || (echo "Build output missing" && exit 1)
          test -f dist/index.html || (echo "index.html missing" && exit 1)
          echo "Build output OK — $(find dist -name '*.html' | wc -l) HTML files generated"
